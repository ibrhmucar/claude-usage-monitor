name: Build & Release DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14  # Apple Silicon runner
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build App Bundle
        run: |
          set -e
          APP_NAME="ClaudeUsageMonitor"
          BUILD="build"
          APP="$BUILD/$APP_NAME.app"
          MACOS="$APP/Contents/MacOS"
          RESOURCES="$APP/Contents/Resources"

          mkdir -p "$MACOS" "$RESOURCES"

          # Icon
          if [ -d "AppIcon.iconset" ]; then
            iconutil -c icns AppIcon.iconset -o "$RESOURCES/AppIcon.icns"
          fi

          # Compile
          swiftc -o "$MACOS/$APP_NAME" -O -whole-module-optimization \
              -target arm64-apple-macosx13.0 \
              -sdk $(xcrun --show-sdk-path) \
              -framework Cocoa -framework SwiftUI -framework Combine \
              "$APP_NAME.swift"

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>ClaudeUsageMonitor</string>
              <key>CFBundleIdentifier</key><string>com.claude.usage-monitor</string>
              <key>CFBundleName</key><string>Claude Usage Monitor</string>
              <key>CFBundleDisplayName</key><string>Claude Usage Monitor</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME#v}</string>
              <key>CFBundleVersion</key><string>${GITHUB_RUN_NUMBER}</string>
              <key>LSMinimumSystemVersion</key><string>13.0</string>
              <key>LSUIElement</key><true/>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundleIconName</key><string>AppIcon</string>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          APP_NAME="ClaudeUsageMonitor"
          DMG_TMP="build/dmg_staging"
          mkdir -p "$DMG_TMP"
          cp -R "build/$APP_NAME.app" "$DMG_TMP/"
          ln -s /Applications "$DMG_TMP/Applications"
          hdiutil create \
            -volname "$APP_NAME" \
            -srcfolder "$DMG_TMP" \
            -ov \
            -format UDZO \
            "$APP_NAME.dmg"
          rm -rf "$DMG_TMP"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ClaudeUsageMonitor.dmg
          generate_release_notes: true
          body: |
            ## Claude Usage Monitor ${{ github.ref_name }}
            
            ### Download
            
            1. Download `ClaudeUsageMonitor.dmg` below
            2. Open the DMG
            3. Drag the app to Applications
            4. Launch and configure (see README for setup)
            
            > ⚠️ First launch: Right-click → Open → Open (to bypass Gatekeeper)
            
            ### Requirements
            - macOS 13.0+ (Ventura or later)
            - Apple Silicon (M1/M2/M3/M4)
            - Claude.ai Pro/Max/Team/Enterprise plan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
